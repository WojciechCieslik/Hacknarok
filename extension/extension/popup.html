<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Site Blocker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="header-row">
      <h2>Site Blocker</h2>
      <span id="profile-badge" class="badge">…</span>
    </div>
    <div id="server-status" class="status">Connecting…</div>
  </header>

  <div id="lock-notice" class="lock-notice" hidden>🔒 Profile protected by password</div>

  <section id="unlock-box" class="add-box" hidden>
    <input
      id="password-input"
      type="password"
      placeholder="Enter profile password..."
      autocomplete="off"
    />
    <button id="unlock-btn">Unlock</button>
  </section>

  <section class="add-box">
    <input
      id="site-input"
      type="text"
      placeholder="e.g. twitter.com or youtube.com/shorts"
      spellcheck="false"
      autocomplete="off"
    />
    <button id="add-btn">Block</button>
  </section>

  <button id="list-toggle" class="list-toggle" aria-expanded="false">
    <span id="list-title">Blocked</span>
    <span id="list-arrow" class="arrow">▸</span>
  </button>
  <ul id="list" hidden></ul>

  <footer id="status-footer"></footer>

  <script src="popup.js"></script>
</body>
</html>
