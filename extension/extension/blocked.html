<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Site Blocked</title>

  <link rel="stylesheet" href="blocked.css" />
</head>
<body>
  <div class="box">
    <div class="icon">🚫</div>
    <h1>Site Blocked</h1>
    <p>This site is on the blocked list for your active profile:</p>
    <div class="domain" id="domain">—</div>
    <div class="profile-line">
      Active profile:
      <span class="profile-pill" id="profile">—</span>
    </div>
    <p class="hint">
      To unblock — switch profile or remove the site from the list in the extension icon.
    </p>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
