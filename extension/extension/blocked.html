<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Strona zablokowana</title>

  <link rel="stylesheet" href="blocked.css" />
</head>
<body>
  <div class="box">
    <div class="icon">🚫</div>
    <h1>Strona zablokowana</h1>
    <p>Ta strona znajduje się na liście blokowanych dla Twojego aktywnego profilu:</p>
    <div class="domain" id="domain">—</div>
    <div class="profile-line">
      Aktywny profil:
      <span class="profile-pill" id="profile">—</span>
    </div>
    <p class="hint">
      Aby odblokować — zmień profil lub usuń stronę z listy w ikonie rozszerzenia.
    </p>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
